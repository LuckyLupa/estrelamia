<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'DM Sans',sans-serif;background:#FAFAF8;color:#2C2C2A;max-width:430px;margin:0 auto;}
.header{background:#534AB7;padding:1.75rem 1.5rem;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;width:220px;height:220px;border-radius:50%;border:45px solid rgba(255,255,255,0.06);top:-70px;right:-70px;}
.hi{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1;}
.h-title{font-size:28px;color:white;line-height:1.2;font-weight:700;margin-bottom:.4rem;}
.h-sub{font-size:12px;color:rgba(255,255,255,0.6);}
.h-logo{width:140px;height:140px;object-fit:contain;flex-shrink:0;opacity:.92;}
.content{padding:1rem 1.25rem 2rem;}
input[type=radio]{display:none;}
.tabs{display:flex;background:white;border-radius:14px;padding:4px;box-shadow:0 2px 12px rgba(0,0,0,0.1);margin-bottom:1.25rem;}
.tlbl{flex:1;padding:11px 6px;text-align:center;font-size:13px;font-weight:500;color:#5F5E5A;border-radius:10px;cursor:pointer;-webkit-user-select:none;user-select:none;}
#t1:checked~.content .tlbl1,#t2:checked~.content .tlbl2{background:#534AB7;color:white;box-shadow:0 2px 8px rgba(83,74,183,.35);}
.panel{display:none;}
#t1:checked~.content #p1{display:block;}
#t2:checked~.content #p2{display:block;}
.tog{display:flex;background:#F1EFE8;border-radius:8px;padding:3px;gap:2px;}
.tlb{padding:8px 12px;font-size:12px;font-weight:500;border-radius:6px;color:#5F5E5A;cursor:pointer;-webkit-user-select:none;user-select:none;}
#ac:checked~.content #lac,#ap:checked~.content #lap,#fs:checked~.content #lfs,#fn:checked~.content #lfn{background:white;color:#534AB7;box-shadow:0 1px 4px rgba(0,0,0,.12);}
.card{background:white;border-radius:16px;padding:1.25rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.clabel{font-size:11px;font-weight:500;color:#5F5E5A;text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;}
.trow{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.trow:last-child{margin-bottom:0;}
.field{margin-bottom:14px;}
.field:last-child{margin-bottom:0;}
.flabel{font-size:13px;color:#5F5E5A;margin-bottom:6px;display:block;}
.iwrap{position:relative;}
.pfx{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:#888780;font-weight:500;pointer-events:none;}
.inp{width:100%;padding:11px 12px 11px 32px;font-size:16px;font-family:-apple-system,sans-serif;border:1.5px solid #D3D1C7;border-radius:10px;background:#FAFAF8;color:#2C2C2A;-webkit-appearance:none;outline:none;}
.inp:focus{border-color:#534AB7;background:white;}
.btn{display:block;width:100%;padding:14px;background:#534AB7;color:white;font-size:15px;font-weight:600;border:none;border-radius:12px;cursor:pointer;margin-top:14px;-webkit-appearance:none;font-family:-apple-system,sans-serif;}
.btn:active{opacity:.85;}
.footer{text-align:center;padding:1rem 0 .5rem;font-size:11px;color:#D3D1C7;}
</style>
</head>

<script>
function brl(v){
  var n=Math.abs(v);
  var s=n.toFixed(2).split('.');
  s[0]=s[0].replace(/\B(?=(\d{3})+(?!\d))/g,'.');
  return 'R$\u00a0'+s[0]+','+s[1];
}
function getA(){return document.getElementById('ap').checked?'p':'c';}
function getF(){return document.getElementById('fs').checked?1:0;}

function cvar(p,a,f){
  // Classico: 14%, Premium: 15%
  var comissao = p * (a==='c' ? 0.14 : 0.15);
  var imp = p * 0.035;
  // Frete: Classico sem frete gratis = comprador paga (nao desconta do seller apos R$79)
  // Premium com frete gratis = seller paga ~50% do frete (media R$21)
  var frete = (a==='p' && f) ? 21 : 0;
  // Taxa fixa ML para precos abaixo de R$79 no Classico
  var cf = (a==='c' && p < 79) ? 6.50 : 0;
  return comissao + imp + frete + cf;
}

function pAlvo(custo,ld,a,f){
  var FX=17.36, p=custo+FX+ld;
  for(var i=0;i<40;i++) p=custo+FX+cvar(p,a,f)+ld;
  return Math.ceil(p*100)/100;
}

function calcPreco(){
  var custo=parseFloat(document.getElementById('custo').value)||0;
  var lucro=parseFloat(document.getElementById('lucro').value)||0;
  if(!custo){alert('Digite o custo da peca primeiro.');return;}
  var a=getA(), f=getF(), FX=17.36;
  var pmin=pAlvo(custo,0,a,f);
  var preco=lucro>0?pAlvo(custo,lucro,a,f):pmin;
  var cv=cvar(preco,a,f);
  var comv=preco*(a==='c'?0.14:0.15);
  var impv=preco*0.035;
  var cfv=(a==='c'&&preco<79)?6.5:0;
  var frv=(a==='p'&&f)?21:0;
  var sobra=preco-custo-FX-cv;

  var h='';
  if(lucro>0){
    h+='<div style="text-align:center;background:#EEEDFE;border-radius:12px;padding:1.25rem;margin-bottom:12px;">';
    h+='<div style="font-size:12px;color:#534AB7;font-weight:500;margin-bottom:6px;">Cobrar por essa peca</div>';
    h+='<div style="font-size:40px;color:#534AB7;font-weight:700;line-height:1;">'+brl(preco)+'</div>';
    h+='<div style="font-size:12px;color:#AFA9EC;margin-top:6px;">Para ganhar '+brl(lucro)+' de verdade</div></div>';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;background:#E1F5EE;border-radius:12px;padding:1rem 1.25rem;margin-bottom:14px;">';
    h+='<span style="font-size:13px;color:#0F6E56;font-weight:500;">Entra no seu bolso</span>';
    h+='<span style="font-size:26px;color:#0F6E56;font-weight:700;">'+brl(sobra)+'</span></div>';
  } else {
    h+='<div style="text-align:center;background:#EEEDFE;border-radius:12px;padding:1.25rem;margin-bottom:14px;">';
    h+='<div style="font-size:12px;color:#534AB7;font-weight:500;margin-bottom:6px;">Preco minimo (sem lucro)</div>';
    h+='<div style="font-size:40px;color:#534AB7;font-weight:700;line-height:1;">'+brl(pmin)+'</div>';
    h+='<div style="font-size:12px;color:#AFA9EC;margin-top:6px;">Abaixo disso voce tem prejuizo</div></div>';
  }
  var bk='display:flex;justify-content:space-between;padding:7px 0;font-size:13px;border-bottom:1px solid #F1EFE8;';
  h+='<div style="'+bk+'"><span style="color:#888780;">Custo da peca</span><span style="font-weight:500;color:#A32D2D;">- '+brl(custo)+'</span></div>';
  h+='<div style="'+bk+'"><span style="color:#888780;">Custos fixos (caixa, contador)</span><span style="font-weight:500;color:#A32D2D;">- '+brl(FX)+'</span></div>';
  h+='<div style="'+bk+'"><span style="color:#888780;">Comissao ML ('+(a==='c'?'14':'15')+'%)</span><span style="font-weight:500;color:#A32D2D;">- '+brl(comv)+'</span></div>';
  if(cfv>0) h+='<div style="'+bk+'"><span style="color:#888780;">Taxa fixa ML (abaixo R$ 79)</span><span style="font-weight:500;color:#A32D2D;">- '+brl(cfv)+'</span></div>';
  if(frv>0) h+='<div style="'+bk+'"><span style="color:#888780;">Frete gratis (50% por conta sua)</span><span style="font-weight:500;color:#A32D2D;">- '+brl(frv)+'</span></div>';
  h+='<div style="display:flex;justify-content:space-between;padding:7px 0;font-size:13px;"><span style="color:#888780;">Imposto Simples (3,5%)</span><span style="font-weight:500;color:#A32D2D;">- '+brl(impv)+'</span></div>';
  var pBg=sobra<0?'#FCEBEB':sobra<10?'#FAEEDA':'#E1F5EE';
  var pC=sobra<0?'#A32D2D':sobra<10?'#BA7517':'#0F6E56';
  var pMsg=sobra<0?'Prejuizo - revise o preco':sobra<10?'Margem muito apertada':'Saudavel - '+Math.round(sobra/preco*100)+'% de margem liquida';
  h+='<div style="text-align:center;padding:8px 12px;border-radius:20px;font-size:13px;font-weight:500;background:'+pBg+';color:'+pC+';margin-top:10px;">'+pMsg+'</div>';
  document.getElementById('res-preco').innerHTML=h;
  document.getElementById('card-res').style.display='block';
}

function calcMes(){
  var r=parseFloat(document.getElementById('mr').value)||0;
  if(!r){alert('Digite o total que entrou no Mercado Livre.');return;}
  var c=parseFloat(document.getElementById('mc').value)||0;
  var t=parseFloat(document.getElementById('mt').value)||0;
  var i=parseFloat(document.getElementById('mi').value)||0;
  var co=parseFloat(document.getElementById('mco').value)||0;
  var o=parseFloat(document.getElementById('mo').value)||0;
  var gastos=c+t+i+co+o;
  var sobra=r-gastos;
  var pos=sobra>=0;
  var pct=Math.round(Math.abs(sobra)/r*100);
  var h='';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">';
  h+='<div style="background:#FAFAF8;border-radius:12px;padding:14px;border:1px solid #F1EFE8;"><div style="font-size:11px;color:#888780;margin-bottom:4px;">Entrou no ML</div><div style="font-size:20px;font-weight:700;color:#534AB7;">'+brl(r)+'</div></div>';
  h+='<div style="background:#FAFAF8;border-radius:12px;padding:14px;border:1px solid #F1EFE8;"><div style="font-size:11px;color:#888780;margin-bottom:4px;">Total de gastos</div><div style="font-size:20px;font-weight:700;color:#A32D2D;">'+brl(gastos)+'</div></div>';
  h+='</div>';
  var sbg=pos?'#E1F5EE':'#FCEBEB', sc=pos?'#0F6E56':'#A32D2D';
  h+='<div style="background:'+sbg+';border-radius:14px;padding:1.25rem;text-align:center;margin-bottom:14px;">';
  h+='<div style="font-size:13px;font-weight:500;color:'+sc+';margin-bottom:6px;">'+(pos?'Sobrou no mes':'Faltou no mes')+'</div>';
  h+='<div style="font-size:42px;font-weight:700;color:'+sc+';line-height:1;">'+brl(sobra)+'</div>';
  h+='<div style="font-size:12px;color:'+sc+';margin-top:6px;">'+(pos?pct+'% do faturamento ficou com voce':'Os gastos ultrapassaram o faturamento')+'</div></div>';
  var bk='display:flex;justify-content:space-between;padding:7px 0;font-size:13px;border-bottom:1px solid #F1EFE8;';
  if(c>0)  h+='<div style="'+bk+'"><span style="color:#888780;">Produtos comprados</span><span style="font-weight:500;color:#A32D2D;">- '+brl(c)+'</span></div>';
  if(t>0)  h+='<div style="'+bk+'"><span style="color:#888780;">Taxas do ML</span><span style="font-weight:500;color:#A32D2D;">- '+brl(t)+'</span></div>';
  if(i>0)  h+='<div style="'+bk+'"><span style="color:#888780;">Imposto</span><span style="font-weight:500;color:#A32D2D;">- '+brl(i)+'</span></div>';
  if(co>0) h+='<div style="'+bk+'"><span style="color:#888780;">Contador</span><span style="font-weight:500;color:#A32D2D;">- '+brl(co)+'</span></div>';
  if(o>0)  h+='<div style="display:flex;justify-content:space-between;padding:7px 0;font-size:13px;"><span style="color:#888780;">Outros gastos</span><span style="font-weight:500;color:#A32D2D;">- '+brl(o)+'</span></div>';
  document.getElementById('res-mes').innerHTML=h;
  document.getElementById('card-mes').style.display='block';
}
</script>
</body>
</html>
